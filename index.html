<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calculadora Multifuncional</title>
<style>
body{
font-family:Arial;
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
radial-gradient(circle at 20% 30%, rgba(255,255,255,0.8) 2px, transparent 3px),
radial-gradient(circle at 70% 60%, rgba(255,255,255,0.7) 2px, transparent 3px),
radial-gradient(circle at 40% 80%, rgba(255,255,255,0.9) 2px, transparent 3px),
linear-gradient(135deg,#ffc0da,#ff9ec8);
background-size:120px 120px,150px 150px,130px 130px,cover;
backdrop-filter:saturate(120%);

}

.container{
background:rgba(255,255,255,0.35);
padding:30px;
border-radius:20px;
width:360px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
backdrop-filter:blur(15px);
-webkit-backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,0.4);
}

h2{
text-align:center;
color:#e75480;
}

.tabs{
display:flex;
gap:10px;
margin-bottom:20px;
}

.tabs button{
flex:1;
padding:10px;
border:none;
border-radius:12px;
background:rgba(255,255,255,0.35);
backdrop-filter:blur(10px);
-webkit-backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.4);
cursor:pointer;
font-weight:bold;
box-shadow:0 4px 10px rgba(0,0,0,0.15);
transition:all 0.2s ease;
}

.tabs button:active{
transform:translateY(2px);
box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

.tabs button:hover{
background:#ff9ec8;
}

.section{display:none;}
.section.active{display:block;}

input,select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:10px;
border:1px solid #ccc;
}

button.calc{
margin-top:10px;
background:rgba(255,255,255,0.35);
color:#e75480;
border:none;
padding:10px;
border-radius:12px;
width:100%;
cursor:pointer;
font-weight:bold;
backdrop-filter:blur(10px);
-webkit-backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.45);
box-shadow:0 4px 10px rgba(0,0,0,0.15);
transition:all 0.2s ease;
}

button.calc:active{
transform:translateY(2px);
box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

.result{
margin-top:15px;
background:#ffe6f2;
padding:10px;
border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>Calculadora Multifuncional ✨</h2>

<div class="tabs">
<button onclick="showSection('temp')">Temperatura</button>
<button onclick="showSection('bmi')">IMC</button>
<button onclick="showSection('cal')">Calorías</button>
</div>

<div id="temp" class="section active">
<label>Introduce el valor</label>
<input id="tempValue" type="number">

<label>Escala de origen</label>
<select id="scale">
<option value="C">Celsius (°C)</option>
<option value="F">Fahrenheit (°F)</option>
<option value="K">Kelvin (K)</option>
</select>

<button class="calc" onclick="convertTemp()">Convertir</button>

<div class="result" id="tempResult"></div>
</div>

<div id="bmi" class="section">
<label>Peso (kg)</label>
<input id="peso" type="number">

<label>Altura (cm)</label>
<input id="altura" type="number">

<button class="calc" onclick="calcBMI()">Calcular IMC</button>

<div class="result" id="bmiResult"></div>
</div>

<div id="cal" class="section">
<label>Alimento</label>
<select id="food">
<option value="265">White bread</option>
<option value="130">Cooked rice</option>
<option value="131">Cooked pasta</option>
<option value="165">Chicken breast</option>
<option value="155">Egg</option>
<option value="61">Whole milk</option>
<option value="52">Apple</option>
<option value="89">Banana</option>
<option value="116">Cooked lentils</option>
<option value="392">Cured cheese</option>
</select>

<label>Cantidad (gramos)</label>
<input id="grams" type="number">

<button class="calc" onclick="calcCalories()">Calcular calorías</button>

<div class="result" id="calResult"></div>
</div>

</div>

<script>
function showSection(id){
 document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
 document.getElementById(id).classList.add('active');
}

function convertTemp(){
 let value=parseFloat(document.getElementById('tempValue').value);
 let scale=document.getElementById('scale').value;
 let c,f,k;

 if(scale==='C'){c=value;f=value*9/5+32;k=value+273.15}
 if(scale==='F'){c=(value-32)*5/9;f=value;k=c+273.15}
 if(scale==='K'){c=value-273.15;f=c*9/5+32;k=value}

 document.getElementById('tempResult').innerHTML=
 'Celsius: '+c.toFixed(2)+' °C<br>'+
 'Fahrenheit: '+f.toFixed(2)+' °F<br>'+
 'Kelvin: '+k.toFixed(2)+' K';
}

function calcBMI(){
 let peso=document.getElementById('peso').value;
 let altura=document.getElementById('altura').value/100;
 let bmi=peso/(altura*altura);
 let cat='';

 if(bmi<18.5)cat='Underweight';
 else if(bmi<25)cat='Normal';
 else if(bmi<30)cat='Overweight';
 else cat='Obesity';

 document.getElementById('bmiResult').innerHTML='IMC: '+bmi.toFixed(2)+'<br>Categoria: '+cat;
}

function calcCalories(){
 let kcal=document.getElementById('food').value;
 let grams=document.getElementById('grams').value;
 let result=kcal*grams/100;

 document.getElementById('calResult').innerHTML='Calorías aproximadas: '+result.toFixed(2)+' kcal';
}
</script>

</body>
</html>
